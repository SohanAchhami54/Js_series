<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #uploadfile{
           color:green;
           font-size:larger; 
           font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
           font-weight: 700;
        }
        .card{
            border: 1px solid black;
            display: inline-block;
        }
        .profile{
            width: 100%; 
            height: 200px;
            overflow: hidden;
        }
        #img{
            width: 100%;
            height: 100%; 
            object-fit:contain;
        }
    </style>
</head>
<body>
    
    <h1 id="h1id">Event Listeners</h1>
    <h2 id="h2id">Event handlers</h2>
    <input type="text" placeholder="Enter text here">
     <h4 id="h4id">1</h4>

     <input id='hiddenfile'  type="file" hidden> 

     <div id="uploadfile">Upload File</div>

    <h3 id="device">Select your Device</h3> 

    <select name="mobile" id="mobilelist">
        <option selected disabled>Select Mobile</option>
         <option value="samsung">Samsung</option>
         <option value="apple">Apple Iphone</option>
         <option value="mi">Xiaomi</option>
         <option value="google">Google</option>
    </select>
   
    <div id="main"> 
        <form action="" id="cardform"> 
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter your name ">

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter your email"> 

            <label for="image">Image:</label>
            <input type="text" id="image" placeholder="Enter img url"> 

            <input type="submit">
        </form>
   


    <div class="card"> 
        <div class="profile">
            <img id="img" src="https://images.unsplash.com/photo-1775401152739-662f585e4360?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Image">
        </div>
        <h2>Sohan Achhami.</h2>
        <h3>This is your image</h3>

    </div>
 </div>

    <!-- <script src="Events1.js"></script> -->
    <script src="commonevent.js"></script>
</body>
</html>
